name: Supabase Keep-Alive

# Controls when the workflow will run
on:
  schedule:
    # Runs at 00:00 every 3 days (Supabase free tier pauses after 7 days of inactivity)
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    # Allows manually triggering the workflow from the GitHub Actions tab

jobs:
  ping_db:
    name: Ping Database
    runs-on: ubuntu-latest

    steps:
      - name: Make REST API Request to Supabase
        # Performs a real database read query on the 'categories' table to keep the DB active
        run: |
          URL="${{ secrets.SUPABASE_PROJECT_URL || secrets.VITE_SUPABASE_URL }}"
          KEY="${{ secrets.SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}"
          
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "Error: Supabase URL or Anon Key secret is missing in GitHub repository settings!"
            echo "Please add SUPABASE_PROJECT_URL (or VITE_SUPABASE_URL) and SUPABASE_ANON_KEY (or VITE_SUPABASE_ANON_KEY) under Settings -> Secrets -> Actions."
            exit 1
          fi

          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${URL}/rest/v1/categories?select=id&limit=1" \
            -H "apikey: ${KEY}" \
            -H "Authorization: Bearer ${KEY}")
          
          echo "Supabase Response Status Code: $STATUS_CODE"
          
          # Returns success only if HTTP response code is 200 (Success) or 206 (Partial Content)
          if [ "$STATUS_CODE" -eq 200 ] || [ "$STATUS_CODE" -eq 206 ]; then
            echo "Successfully connected and performed a database read."
            exit 0
          else
            echo "Failed to connect or perform database read. Error code: $STATUS_CODE"
            exit 1
          fi
